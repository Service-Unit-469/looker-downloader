name: CI Build
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run Tests
        run: npm test
        env:
          LOOKER_HOST: ${{ secrets.LOOKER_HOST}}
          LOOKER_USERNAME: ${{ secrets.LOOKER_USERNAME}}
          LOOKER_PASSWORD: ${{ secrets.LOOKER_PASSWORD}}
          LOOKER_REPORT: ${{ secrets.LOOKER_REPORT}}
          MULTIFILE_REPORT: ${{ secrets.MULTIFILE_REPORT}}
  automerge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          target: 'minor'
          target-development: any
